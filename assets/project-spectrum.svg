    <path d="M704 512H802" fill="none" stroke="#d39a18" stroke-width="56" stroke-linecap="round"/>
    <path d="M770 448 834 512 770 576" fill="none" stroke="#d39a18" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="788" y="372" width="142" height="280" rx="34" fill="#17202a"/>
    <text x="859" y="550" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="800" text-anchor="middle">01</text>
