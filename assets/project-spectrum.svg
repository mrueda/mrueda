<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 236" role="img" aria-labelledby="title desc">
  <title id="title">Featured independent open-source projects</title>
  <desc id="desc">
    The canonical marks for Pad-Lattice, RecallRx, Shelf-School, and
    DataMatrix2Codes share one open-source project path.
  </desc>

  <defs>
    <linearGradient id="pad-case" x1="128" x2="896" y1="96" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242735"/>
      <stop offset="1" stop-color="#090b12"/>
    </linearGradient>
    <style>
      text {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .canvas { fill: #f7f9fb; stroke: #d0d7de; }
      .ink { fill: #17202a; }
      .muted { fill: #59636e; }
      .route { fill: none; stroke: #9aa5ae; }
      .project { font-size: 18px; font-weight: 750; letter-spacing: 0; }
      .domain { font-size: 11px; font-weight: 750; letter-spacing: 1.2px; }
      .kicker { font-size: 12px; font-weight: 750; letter-spacing: 1.4px; }

      @media (prefers-color-scheme: dark) {
        .canvas { fill: #0d1117; stroke: #30363d; }
        .ink { fill: #f0f6fc; }
        .muted { fill: #b1bac4; }
        .route { stroke: #52616c; }
      }
    </style>
  </defs>

  <rect class="canvas" x="1" y="1" width="1198" height="234" rx="8" stroke-width="2"/>
  <text class="muted kicker" x="600" y="27" text-anchor="middle">FEATURED PROJECTS / DISTINCT DOMAINS / ONE OPEN-SOURCE PRACTICE</text>

  <!-- A shared practice, not a data flow or dependency chain. -->
  <path class="route" d="M52 103C116 103 126 103 150 103C250 103 279 130 330 130C383 130 402 103 450 103C549 103 580 130 630 130C683 130 702 103 750 103C849 103 880 130 930 130C983 130 1002 103 1050 103C1098 103 1121 103 1148 103" stroke-width="2.5"/>
  <g fill="#9aa5ae">
    <circle cx="300" cy="127" r="3"/>
    <circle cx="600" cy="127" r="3"/>
    <circle cx="900" cy="127" r="3"/>
  </g>

  <!-- Pad-Lattice canonical mark. -->
  <g transform="translate(106 59) scale(.0859375)">
    <rect width="1024" height="1024" rx="196" fill="#080a10"/>
    <rect x="104" y="104" width="816" height="816" rx="150" fill="url(#pad-case)"/>
    <g opacity=".22" stroke="#9aa4b2" stroke-width="10" stroke-linecap="round">
      <path d="M256 256H768M256 384H768M256 512H768M256 640H768M256 768H768"/>
      <path d="M256 256V768M384 256V768M512 256V768M640 256V768M768 256V768"/>
    </g>
    <g fill="none" stroke="#f8fafc" stroke-linecap="round" stroke-linejoin="round" opacity=".5">
