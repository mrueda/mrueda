    <circle cx="512" cy="512" r="388" fill="#ffffff" stroke="#d39a18" stroke-width="18"/>
    <g fill="none" stroke="#0e9baa" stroke-width="58" stroke-linecap="round" stroke-linejoin="round">
      <path d="M224 358V238H344"/>
      <path d="M680 238H800V358"/>
      <path d="M800 666V786H680"/>
      <path d="M344 786H224V666"/>
    </g>
    <g fill="#17202a">
      <rect x="312" y="326" width="54" height="372"/>
      <rect x="312" y="644" width="372" height="54"/>
      <rect x="402" y="326" width="54" height="54"/>
      <rect x="510" y="326" width="108" height="54"/>
      <rect x="618" y="380" width="66" height="108"/>
      <rect x="402" y="434" width="108" height="54"/>
      <rect x="564" y="488" width="54" height="108"/>
      <rect x="402" y="542" width="54" height="102"/>
      <rect x="510" y="542" width="54" height="54"/>
      <rect x="618" y="596" width="66" height="48"/>
