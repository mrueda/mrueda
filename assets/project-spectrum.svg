  <text class="ink project" x="150" y="184" text-anchor="middle">Pad-Lattice</text>
  <text class="domain" x="150" y="209" text-anchor="middle" fill="#087d88">AI INTERFACES</text>

  <text class="ink project" x="450" y="184" text-anchor="middle">RecallRx</text>
  <text class="domain" x="450" y="209" text-anchor="middle" fill="#8a5a00">HEALTHCARE</text>

  <text class="ink project" x="750" y="184" text-anchor="middle">Shelf-School</text>
