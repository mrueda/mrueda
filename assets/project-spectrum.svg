    <rect x="420" y="198" width="184" height="184" rx="40" fill="#2f80ff"/>
    <rect x="642" y="420" width="184" height="184" rx="40" fill="#ffd43b"/>
    <rect x="420" y="642" width="184" height="184" rx="40" fill="#34d058"/>
    <rect x="198" y="420" width="184" height="184" rx="40" fill="#ff4d5e"/>
    <path d="M486 463 572 512 486 561V528H428V496H486Z" fill="#f8fafc"/>
    <circle cx="612" cy="512" r="16" fill="#f8fafc"/>
  </g>

